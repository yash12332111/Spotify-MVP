name: Keep-alive (Supabase + Vercel warm)

# ─────────────────────────────────────────────────────────────
# Runs 3× per week between July 6 and July 15 (the evaluation window).
# Two separate jobs:
#   1. ping-supabase  — hits the Supabase REST endpoint directly.
#      This is a genuine DB query and RESETS the 7-day pause timer.
#      A Vercel-only ping does NOT reset it (cached responses never
#      reach Postgres).
#   2. ping-vercel    — calls /api/health on the deployed app.
#      This warms the Vercel serverless function so the first
#      evaluator of the day gets a faster cold start.
#
# Disable after July 15 by deleting this file or setting the
# schedule to an empty array.
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   SUPABASE_URL          — your project URL (https://xxx.supabase.co)
#   SUPABASE_ANON_KEY     — the anon/public key (NOT the service key)
#   VERCEL_PRODUCTION_URL — the deployed app URL (https://onesong.vercel.app)
# ─────────────────────────────────────────────────────────────

on:
  schedule:
    # Mon, Wed, Fri at 06:00 UTC (11:30 IST) — covers July 6–15
    - cron: "0 6 * * 1,3,5"
  workflow_dispatch: # allow manual trigger

jobs:
  ping-supabase:
    name: Ping Supabase (reset pause timer)
    runs-on: ubuntu-latest
    steps:
      - name: Hit Supabase REST endpoint (real DB query)
        # Querying /rest/v1/ triggers schema introspection — genuine Postgres
        # activity. Using the service key here (same as in Vercel env vars).
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}")
          echo "Supabase REST ping status: $STATUS"
          # 200 or 400 both mean the DB is alive (400 = no resource specified, DB responded)
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "400" ]; then
            echo "::warning::Supabase ping returned unexpected status $STATUS — project may be pausing"
            exit 1
          fi

  ping-vercel:
    name: Ping Vercel (warm function)
    runs-on: ubuntu-latest
    needs: ping-supabase
    steps:
      - name: Hit /api/health on production
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VERCEL_PRODUCTION_URL }}/api/health")
          echo "Vercel /api/health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::/api/health returned $STATUS — check Vercel deployment"
            exit 1
          fi
